    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQSXG5q9DZ3kf6Yp-QFRuxNEqfY9HMl893gl20F_jRfOLgL4IY2uscaJIEV1bswQa4WweZhv7dDWQH7/pub?output=csv';

        async function updateMap() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                
                // Separem per línies i traiem la capçalera
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== "").slice(1);

                rows.forEach((row) => {
                    const cols = row.split(',');
                    // Suposem: Col 0 = ID Hexàgon (1-60), Col 1 = ID Jugador
                    const hexId = cols[0] ? cols[0].trim() : "";
                    const rawPlayer = cols[1] ? cols[1].trim() : "";
                    
                    // Neteja per obtenir només el número
                    const playerNumber = rawPlayer.replace(/\D/g, '');

                    // Busquem el polígon per ID (ex: "hex1")
                    const polygon = document.getElementById('hex' + hexId);

                    if (polygon) {
                        // Neteja classes anteriors
                        polygon.className.baseVal = '';
                        
                        // Apliquem la nova classe si el número és vàlid
                        if (playerNumber !== "") {
                            polygon.classList.add('p' + playerNumber);
                        }
                    }
                });
            } catch (err) {
                console.error("Error actualitzant mapa:", err);
            }
        }

        // Executar inicialment
        updateMap();
        
        // Actualitzar cada 60 segons automàticament
        setInterval(updateMap, 60000);
    </script>

<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Mapa Europa - Hexàgons Flat-Topped (CAD Precision)</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        svg { width: 100%; max-width: 1600px; height: auto; }
        .hex { fill: none; stroke: #ff00ff; stroke-width: 3; vector-effect: non-scaling-stroke; }
    </style>
</head>
<body>
    <svg viewBox="0 0 1600 900" id="map">
        <image href="Mapa europa-Layout2.jpg" width="1600" height="900" />
    </svg>

    <script>
        const svg = document.getElementById('map');
        
        // Mides derivades dels 155px (costat s)
        const s = 155;
        const H = 268.46; // Altura total
        const STEP_X = 232.5; // 1.5 * s
        const STEP_Y = 268.46; // Sqrt(3) * s
        
        // Coordenades d'inici (Centre del Hexàgon 1)
        // Ajustades per coincidir amb la teva imatge de referència
        const START_X = 265;
        const START_Y = 277;

        function createHex(c, r) {
            const x = START_X + (c * STEP_X);
            const y = START_Y + (r * STEP_Y) + (c % 2 !== 0 ? STEP_Y / 2 : 0);
            
            // Vèrtexs per Hexàgon Flat-Topped
            const points = [
                `${x - s/2},${y - H/2}`, `${x + s/2},${y - H/2}`,
                `${x + s},${y}`, `${x + s/2},${y + H/2}`,
                `${x - s/2},${y + H/2}`, `${x - s},${y}`
            ].join(" ");

            const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            poly.setAttribute("points", points);
            poly.setAttribute("class", "hex");
            svg.appendChild(poly);
        }

        // Matriu de posicions (Columna, Fila)
        const grid = [
            {c:0, r:0}, {c:0, r:1}, {c:0, r:2},
            {c:1, r:-1}, {c:1, r:0}, {c:1, r:1}, {c:1, r:2},
            {c:2, r:-1}, {c:2, r:0}, {c:2, r:1}, {c:2, r:2},
            {c:3, r:-2}, {c:3, r:-1}, {c:3, r:0}, {c:3, r:1}, {c:3, r:2},
            {c:4, r:-2}, {c:4, r:-1}, {c:4, r:0}, {c:4, r:1}, {c:4, r:2},
            {c:5, r:-2}, {c:5, r:-1}, {c:5, r:0}, {c:5, r:1}, {c:5, r:2}
        ];

        grid.forEach(h => createHex(h.c, h.r));
    </script>
</body>
</html>

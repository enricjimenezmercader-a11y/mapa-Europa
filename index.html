<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Mapa Europa - Graella Ajustada</title>
    <style>
        body { 
            margin: 0; background: #222; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; 
        }
        #container { 
            width: 90vw; max-width: 1200px; 
            aspect-ratio: 26757154 / 22877366; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        svg { width: 100%; height: 100%; display: block; }
        .hex { 
            fill: none; 
            stroke: #ff00ff; 
            stroke-width: 1000; /* Reduït de 50000 a 15000 per afinar el traç */
            vector-effect: non-scaling-stroke;
        }
    </style>
</head>
<body>
    <div id="container">
        <svg id="map" viewBox="0 0 26757154 22877366">
            <image 
                href="https://raw.githubusercontent.com/enricjimenezmercader-a11y/mapa-Europa/6898921c906330dcfbaaa4b3be8e8745a0800762/Mapa%20europa-Layout2.jpg"
                width="26757154" height="22877366" 
            />
        </svg>
    </div>

    <script>
        const svg = document.getElementById('map');
        
        // Constants
        const s = 1595081; 
        const H = 2762761; 
        const START_CAD_X = 2898289.5; 
        const START_CAD_Y = 2418393.5;
        const STEP_X = 1595081; 
        const STEP_Y = 2762761; 

        const grid = [
            {c:0, r:0}, {c:0, r:1}, {c:0, r:2}, {c:0, r:3},
            {c:1, r:0}, {c:1, r:1}, {c:1, r:2}, {c:1, r:3}, {c:1, r:4},
            {c:2, r:0}, {c:2, r:1}, {c:2, r:2},
            {c:3, r:-1}, {c:3, r:0}, {c:3, r:1}, {c:3, r:2}, {c:3, r:3}, {c:3, r:4},
            {c:4, r:-2}, {c:4, r:-1}, {c:4, r:0}, {c:4, r:1}, {c:4, r:2}, {c:4, r:3}, {c:4, r:4},
            {c:5, r:-2}, {c:5, r:-1}, {c:5, r:0}, {c:5, r:1}, {c:5, r:2}, {c:5, r:3}, {c:5, r:4},
            {c:6, r:-3}, {c:6, r:-2}, {c:6, r:-1}, {c:6, r:0}, {c:6, r:1}, {c:6, r:2}, {c:6, r:3},
            {c:7, r:-3}, {c:7, r:-2}, {c:7, r:-1}, {c:7, r:0}, {c:7, r:1}, {c:7, r:2}, {c:7, r:3},
            {c:8, r:-4}, {c:8, r:-3}, {c:8, r:-2}, {c:8, r:-1}, {c:8, r:0}, {c:8, r:1}, {c:8, r:2},
            {c:9, r:-4}, {c:9, r:-3}, {c:9, r:-2}, {c:9, r:-1}, {c:9, r:0}, {c:9, r:1}, {c:9, r:2}
        ];

        grid.forEach(h => {
            const cx = START_CAD_X + (h.c * STEP_X);
            const cy = START_CAD_Y + (h.r * STEP_Y) + (h.c % 2 !== 0 ? STEP_Y / 2 : 0);
            
            const points = [
                {x: cx - s/2, y: cy - H/2},
                {x: cx + s/2, y: cy - H/2},
                {x: cx + s,   y: cy},       
                {x: cx + s/2, y: cy + H/2},
                {x: cx - s/2, y: cy + H/2},
                {x: cx - s,   y: cy}        
            ];

            const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            poly.setAttribute("points", points.map(p => `${p.x},${p.y}`).join(" "));
            poly.setAttribute("class", "hex");
            svg.appendChild(poly);
        });
    </script>
</body>
</html>

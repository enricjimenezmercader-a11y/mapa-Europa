    <title>Mapa d'Europa Interactiu</title>
    <style>
        html, body { margin: 0; padding: 0; min-height: 100%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; }
        .map-container { position: relative; width: 95vw; max-width: 1600px; aspect-ratio: 3840 / 2160; }
        .map-container img { width: 100%; height: 100%; display: block; }
        .hex-overlay { position: absolute; inset: 0; width: 100%; height: 100%; }
        .hex-overlay polygon { fill: transparent; stroke: #ff2b2b; stroke-width: 6; stroke-linejoin: round; cursor: pointer; transition: fill 0.2s; }
        .hex-overlay polygon:hover { fill: rgba(255, 255, 255, 0.2); }
        
        /* Classe per fer invisible i inactiu l'hexàgon */
        .transparent { stroke: transparent !important; fill: transparent !important; pointer-events: none; }
        
        /* Estils de la finestra modal */
        #infoModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 12px; z-index: 1000;
            max-width: 400px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-family: sans-serif;
        }
        #infoModal.active { display: block; }
        .close-btn { cursor: pointer; float: right; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>

<div id="infoModal">
    <span class="close-btn" onclick="closeModal()">X</span>
    <h2 id="modalTitle">Títol</h2>
    <p id="modalContent">Informació detallada...</p>
</div>

<script>
    // 1. DADES: Omple aquí la informació. Les claus (1, 2, 3...) corresponen als ID de l'hexàgon.
    const hexData = {
        1: { titol: "Hexàgon 1", info: "Informació de la fila 17..." },
        2: { titol: "Hexàgon 2", info: "Informació de la fila 18..." },
        // ... afegeix del 3 fins al 60
        60: { titol: "Hexàgon 60", info: "Informació de la fila 76..." }
    };

    // 2. LÒGICA: Detecta el click i mostra el modal
    const polygons = document.querySelectorAll('polygon');
    const modal = document.getElementById('infoModal');

    polygons.forEach(poly => {
        poly.addEventListener('click', () => {
            const id = poly.getAttribute('data-id');
            // Comprova si hi ha dades per aquest ID
            if(hexData[id]) {
                document.getElementById('modalTitle').innerText = hexData[id].titol;
                document.getElementById('modalContent').innerText = hexData[id].info;
                modal.classList.add('active');
            } else {
                console.log("No hi ha dades per l'hexàgon: " + id);
            }
        });
    });

    function closeModal() {
        modal.classList.remove('active');
    }
</script>

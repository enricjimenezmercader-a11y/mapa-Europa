<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Mapa Europa - Graella CAD Perfecta</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        /* He afegit una mica d'estil fosc de fons per veure bé on acaba el mapa */
        #container { position: relative; width: 95vw; max-width: 1400px; }
        svg { width: 100%; height: auto; display: block; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .hex { fill: none; stroke: #ff00ff; stroke-width: 3; vector-effect: non-scaling-stroke; }
    </style>
</head>
<body>
    <div id="container">
        <svg viewBox="0 0 40670873 22877366" id="map">
            <image href="https://raw.githubusercontent.com/enricjimenezmercader-a11y/mapa-Europa/6898921c906330dcfbaaa4b3be8e8745a0800762/Mapa%20europa-Layout2.jpg" 
                   width="40670873" height="22877366" />
        </svg>
    </div>

    <script>
        const svg = document.getElementById('map');
        const SVG_HEIGHT = 22877366;
        
        // Càlculs dels vèrtexs
        const s = 1595080.5; 
        const H = 2762761; 
        const STEP_X = 1.5 * s;
        const STEP_Y = H;       
        
        // Origen CAD basat en el centre de l'hexàgon 4
        const START_CAD_X = 2898289.5; 
        const START_CAD_Y = 2418393;

        function drawHex(c, r) {
            const cad_x = START_CAD_X + (c * STEP_X);
            const cad_y = START_CAD_Y + (r * STEP_Y) + (c % 2 !== 0 ? STEP_Y / 2 : 0);
            
            const cad_points = [
                {x: cad_x - s/2, y: cad_y - H/2},
                {x: cad_x + s/2, y: cad_y - H/2},
                {x: cad_x + s,   y: cad_y},      
                {x: cad_x + s/2, y: cad_y + H/2},
                {x: cad_x - s/2, y: cad_y + H/2},
                {x: cad_x - s,   y: cad_y}       
            ];

            // Inversió de l'eix Y per adaptar CAD a SVG
            const svg_points = cad_points.map(pt => `${pt.x},${SVG_HEIGHT - pt.y}`).join(" ");

            const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            poly.setAttribute("points", svg_points);
            poly.setAttribute("class", "hex");
            svg.appendChild(poly);
        }

        // Matriu de distribució dels 60 hexàgons
        const grid = [
            {c:0, r:0}, {c:0, r:1}, {c:0, r:2}, {c:0, r:3},
            {c:1, r:0}, {c:1, r:1}, {c:1, r:2}, {c:1, r:3}, {c:1, r:4},
            {c:2, r:0}, {c:2, r:1}, {c:2, r:2},
            {c:3, r:-1}, {c:3, r:0}, {c:3, r:1}, {c:3, r:2}, {c:3, r:3}, {c:3, r:4},
            {c:4, r:-2}, {c:4, r:-1}, {c:4, r:0}, {c:4, r:1}, {c:4, r:2}, {c:4, r:3}, {c:4, r:4},
            {c:5, r:-2}, {c:5, r:-1}, {c:5, r:0}, {c:5, r:1}, {c:5, r:2}, {c:5, r:3}, {c:5, r:4},
            {c:6, r:-3}, {c:6, r:-2}, {c:6, r:-1}, {c:6, r:0}, {c:6, r:1}, {c:6, r:2}, {c:6, r:3},
            {c:7, r:-3}, {c:7, r:-2}, {c:7, r:-1}, {c:7, r:0}, {c:7, r:1}, {c:7, r:2}, {c:7, r:3},
            {c:8, r:-4}, {c:8, r:-3}, {c:8, r:-2}, {c:8, r:-1}, {c:8, r:0}, {c:8, r:1}, {c:8, r:2},
            {c:9, r:-4}, {c:9, r:-3}, {c:9, r:-2}, {c:9, r:-1}, {c:9, r:0}, {c:9, r:1}, {c:9, r:2}
        ];

        grid.forEach(h => drawHex(h.c, h.r));
    </script>
</body>
</html>

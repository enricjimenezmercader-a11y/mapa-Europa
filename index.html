<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa d'Europa amb retícula hexagonal</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .map-container {
            position: relative;
            width: 95vw;
            max-width: 1600px;
            aspect-ratio: 3840 / 2160;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .map-container img {
            width: 100%;
            height: 100%;
            display: block;
        }
        .hex-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hex-overlay polygon {
            fill: transparent; /* Valor per defecte */
            stroke: #ff2b2b;
            stroke-width: 6;
            stroke-linejoin: round;
            transition: fill 0.3s ease; /* Transició suau */
        }
        .hex-overlay text {
            fill: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 72px;
            font-weight: 700;
            paint-order: stroke;
            stroke: #000;
            stroke-width: 4;
        }
    </style>
</head>
<body>

    <div class="map-container">
        <img src="https://raw.githubusercontent.com/enricjimenezmercader-a11y/mapa-Europa/6898921c906330dcfbaaa4b3be8e8745a0800762/Mapa%20europa-Layout2.jpg" alt="Mapa d'Europa">
        <svg class="hex-overlay" viewBox="0 0 3840 2160" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="1011.67,354.84 934.83,487.92 781.17,487.92 704.33,354.84 781.17,221.76 934.83,221.76"/>
            </svg>
    </div>

    <script>
        async function carregarDadesIColor() {
            const url = "https://script.google.com/macros/s/AKfycbzGeb4V_8KWEaLbodIgryPsjiC4WD-l2cTVN5UhEa5ASD0-1jsNJlQKy8u_UfkyjcY1/exec";
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                
                // 1. Identificar propietaris únics
                const propietaris = [...new Set(data.map(item => item.Propietat))];
                
                // 2. Definir una paleta de 7 colors
                const paleta = ["#FF6B6B", "#4ECDC4", "#45B7D1", "#96CEB4", "#FFEEAD", "#D4A5A5", "#9B59B6"];
                const mapaColors = {};
                propietaris.forEach((p, index) => {
                    mapaColors[p] = paleta[index % paleta.length];
                });

                // 3. Seleccionar tots els polígons
                const poligons = document.querySelectorAll('.hex-overlay polygon');

                // 4. Aplicar color segons l'índex
                data.forEach((item, index) => {
                    if (poligons[index]) {
                        const color = mapaColors[item.Propietat];
                        poligons[index].style.fill = color;
                        poligons[index].style.fillOpacity = "0.33";
                    }
                });

            } catch (error) {
                console.error("Error carregant les dades del mapa:", error);
            }
        }

        // Executar quan la pàgina estigui carregada
        window.onload = carregarDadesIColor;
    </script>
</body>
</html>

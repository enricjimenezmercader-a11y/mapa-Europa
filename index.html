<!DOCTYPE html>
<html lang="ca">
<head>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; }
        svg { width: 100%; max-width: 1600px; height: auto; }
        .hex { fill: none; stroke: #ff00ff; stroke-width: 3; }
    </style>
</head>
<body>
    <svg viewBox="0 0 1600 900" id="map">
        <image href="Mapa europa-Layout2.jpg" width="1600" height="900" />
    </svg>

    <script>
        const svg = document.getElementById('map');
        
        // Paràmetres extrets directament de la imatge:
        const W = 110;  // Amplada de l'hexàgon (de costat a costat)
        const H = 127;  // Alçada de l'hexàgon (de punta a punta)
        const STEP_X = 110;
        const STEP_Y = 95;
        const START_X = 293;
        const START_Y = 260;

        // Funció per generar hexàgon Pointy-Topped
        function drawHex(id, c, r) {
            const x = START_X + (c * STEP_X);
            const y = START_Y + (r * STEP_Y) + (c % 2 === 0 ? 47.5 : 0);
            
            const p = [
                `${x},${y - H/2}`, `${x + W/2},${y - H/4}`,
                `${x + W/2},${y + H/4}`, `${x},${y + H/2}`,
                `${x - W/2},${y + H/4}`, `${x - W/2},${y - H/4}`
            ].join(" ");

            const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            poly.setAttribute("points", p);
            poly.setAttribute("class", "hex");
            svg.appendChild(poly);
        }

        // Llistat definitiu basat en la posició visual:
        const grid = [
            {id:1, c:0, r:0}, {id:2, c:0, r:1}, {id:3, c:0, r:2}, {id:4, c:0, r:3},
            {id:5, c:1, r:-1}, {id:6, c:1, r:0}, {id:7, c:1, r:1}, {id:8, c:1, r:2}, {id:9, c:1, r:3},
            // ... afegeix aquí la resta seguint aquest patró
        ];

        grid.forEach(h => drawHex(h.id, h.c, h.r));
    </script>
</body>
</html>

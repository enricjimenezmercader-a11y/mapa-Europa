<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Mapa Interactiu</title>
    <style>
        /* ... mateixos estils anteriors ... */
        .map-container { position: relative; width: 95vw; max-width: 1600px; aspect-ratio: 3840 / 2160; }
        .map-container img { width: 100%; height: 100%; display: block; }
        .hex-overlay { position: absolute; inset: 0; width: 100%; height: 100%; }
        
        /* Hexàgons normals */
        .clickable { fill: transparent; stroke: #ff2b2b; stroke-width: 6; stroke-linejoin: round; cursor: pointer; }
        .clickable:hover { fill: rgba(255, 255, 255, 0.2); }
        
        /* Hexàgons transparents (X) */
        .transparent { stroke: transparent !important; fill: transparent !important; pointer-events: none; }
        
        #infoModal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 25px; border-radius: 12px; z-index: 1000;
            max-width: 400px; width: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-family: sans-serif;
        }
        #infoModal.active { display: block; }
        .close-btn { cursor: pointer; float: right; font-weight: bold; }
    </style>
</head>
<body>

<div class="map-container">
    <img src="https://raw.githubusercontent.com/enricjimenezmercader-a11y/mapa-Europa/6898921c906330dcfbaaa4b3be8e8745a0800762/Mapa%20europa-Layout2.jpg" alt="Mapa">
    <svg class="hex-overlay" viewBox="0 0 3840 2160" preserveAspectRatio="none">
        
        <polygon class="transparent" points="1011.67,354.84 934.83,487.92 781.17,487.92 704.33,354.84 781.17,221.76 934.83,221.76"/>
        
        <polygon data-id="3" class="clickable" points="1011.67,887.16 934.83,1020.24 781.17,1020.24 704.33,887.16 781.17,754.08 934.83,754.08"/>
        
        </svg>
</div>

<div id="infoModal">
    <span class="close-btn" onclick="closeModal()">X</span>
    <h2 id="modalTitle"></h2>
    <p id="modalContent"></p>
</div>

<script>
    // DADES: Omple els valors aquí
    const hexData = {
        3: { titol: "Hexàgon 3", info: "Informació de la fila X del teu excel" },
        4: { titol: "Hexàgon 4", info: "Informació de la fila Y..." }
    };

    // LOGICA: Selecciona NOMÉS els que tenen la classe .clickable
    const hexagons = document.querySelectorAll('.clickable');
    const modal = document.getElementById('infoModal');

    hexagons.forEach(hex => {
        hex.addEventListener('click', () => {
            const id = hex.getAttribute('data-id');
            const data = hexData[id];
            
            if(data) {
                document.getElementById('modalTitle').innerText = data.titol;
                document.getElementById('modalContent').innerText = data.info;
                modal.classList.add('active');
            } else {
                console.warn("No hi ha dades configurades per l'ID: " + id);
            }
        });
    });

    function closeModal() {
        modal.classList.remove('active');
    }
</script>

</body>
</html>

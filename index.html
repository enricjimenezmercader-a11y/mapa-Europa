<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa d'Europa amb retícula hexagonal</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .map-container {
            position: relative;
            width: 95vw;
            max-width: 1600px;
            /* Mantenim el aspect-ratio del mapa original */
            aspect-ratio: 3840 / 2160;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .map-container img {
            width: 100%;
            height: 100%;
            display: block;
        }
        .hex-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hex-overlay polygon {
            fill: rgba(255, 43, 43, 0.1); /* Llum tènue per veure el mapa */
            stroke: #ff2b2b;
            stroke-width: 6;
            stroke-linejoin: round;
        }
        .hex-overlay text {
            fill: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 72px;
            font-weight: 700;
            paint-order: stroke;
            stroke: #000;
            stroke-width: 4;
            pointer-events: none;
        }
    </style>
</head>

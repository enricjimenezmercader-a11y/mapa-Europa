<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Europa Hexàgons</title>
    <style>
        body { margin: 0; background-color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .map-container { width: 90%; max-width: 1000px; }
        .hex-overlay { width: 100%; height: auto; }
        /* Estils bàsics per als hexàgons */
        .hex-overlay polygon { 
            stroke: #fff; 
            stroke-width: 1px; 
            transition: fill 0.5s ease; 
            fill: transparent; /* Color per defecte */
        }
        .hex-overlay polygon:hover { opacity: 0.7; }
    </style>
</head>
<body>

    <div class="map-container">
        <svg class="hex-overlay" viewBox="0 0 1000 800">
            </svg>
    </div>

    <script>
        // 1. URL DEL TEU GOOGLE APPS SCRIPT
        const scriptUrl = "https://script.google.com/macros/s/AKfycbz5tbp5l9lTohwVDiropS1yIepwqw4SrYjyrcEuZTdp91P7l3eJiUGEQr943UfPqEh7/exec";

        // 2. Funció per generar colors
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            return `hsl(${Math.abs(hash % 360)}, 70%, 50%)`;
        }

        // 3. Funció principal per carregar i pintar
        async function actualitzarMapa() {
            try {
                console.log("Obtenint dades...");
                const response = await fetch(scriptUrl);
                const data = await response.json();
                const dadesMapa = data.Mapa;

                dadesMapa.forEach(item => {
                    const numero = item["Número hexagon"];
                    const propietari = item["Propietat"];
                    
                    // Busquem l'element per ID (hex-1, hex-2, etc.)
                    const element = document.getElementById('hex-' + numero);

                    if (element) {
                        if (propietari && propietari.trim() !== "") {
                            element.style.fill = stringToColor(propietari);
                        } else {
                            element.style.fill = "transparent";
                        }
                    }
                });
                console.log("Mapa actualitzat correctament.");
            } catch (error) {
                console.error("Error actualitzant el mapa:", error);
            }
        }

        // Execució
        actualitzarMapa();
        // Refresca cada 10 segons
        setInterval(actualitzarMapa, 10000);
    </script>
</body>
</html>

    <script>
        const scriptUrl = "https://script.google.com/macros/s/AKfycby2bGAmT1O1DMj8QiQ8PVLtndy1OJTEsAUmBj0aTvfHxsWfVV2OL38zqkwF2WbZlPyh/exec";

        // Funció per generar colors deterministes segons el nom
        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            return `hsla(${Math.abs(hash % 360)}, 70%, 50%, 0.6)`;
        }

        function carregarDades() {
            const status = document.getElementById('status');
            const callbackName = 'callback_' + Math.round(100000 * Math.random());
            
            // Declarem l'etiqueta script a l'inici
            const script = document.createElement('script');
            
            window[callbackName] = function(data) {
                status.innerText = "Dades actualitzades";
                
                const poligons = document.querySelectorAll('.hex-overlay polygon');

                data.forEach((item, index) => {
                    const nomJugador = item["Propietat"];
                    if (poligons[index]) {
                        if (nomJugador && nomJugador.trim() !== "") {
                            poligons[index].style.fill = stringToColor(nomJugador);
                        } else {
                            poligons[index].style.fill = "transparent";
                        }
                    }
                });

                // NETEJA: Un cop s'han pintat les dades, esborrem la memòria i l'etiqueta HTML
                delete window[callbackName];
                script.remove();
            };

            // NETEJA en cas d'error de xarxa (per no acumular crides fallides)
            script.onerror = function() {
                status.innerText = "Error de connexió al carregar";
                delete window[callbackName];
                script.remove();
            };

            script.src = `${scriptUrl}?callback=${callbackName}&t=${new Date().getTime()}`;
            document.body.appendChild(script);
        }

        carregarDades();
        setInterval(carregarDades, 5000);
    </script>

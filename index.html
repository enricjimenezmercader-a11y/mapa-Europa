<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa d'Europa - Correcció de Geometria</title>
    <style>
        body {
            background-color: #f0f0f0;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .map-container {
            width: 100%;
            max-width: 1400px;
            padding: 20px;
        }

        svg {
            width: 100%;
            height: auto;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.2);
            background-color: white;
        }

        .hex-polygon {
            fill: rgba(0, 0, 0, 0);
            stroke: #ff00ff; /* Magenta per comprovar visualment */
            stroke-width: 2.5;
            cursor: pointer;
            transition: fill 0.2s, stroke 0.2s;
        }

        .hex-polygon:hover {
            fill: rgba(0, 150, 255, 0.4);
            stroke: #0096ff;
        }
    </style>
</head>
<body>

    <div class="map-container">
        <svg viewBox="0 0 1600 900" id="hex-grid">
            <image href="https://raw.githubusercontent.com/enricjimenezmercader-a11y/mapa-Europa/ddd5150cf2ed279aaf0608cd4e9af7f266838c25/Mapa%20europa-Layout2.jpg" 
                   x="0" y="0" width="1600" height="900" preserveAspectRatio="none" />
        </svg>
    </div>

    <script>
        const svg = document.getElementById('hex-grid');

        // --- NOVA GEOMETRIA REAL: HEXÀGONS AMB PUNTA A DALT (Pointy-topped) ---
        const HEX_HEIGHT = 132.5; // Alçada total de punta a punta
        const HEX_WIDTH = HEX_HEIGHT * (Math.sqrt(3) / 2); // ~114.74px d'amplada de costat a costat
        
        const STEP_X = HEX_WIDTH;         // Distància horitzontal real entre columnes
        const STEP_Y = HEX_HEIGHT * 0.75;  // Distància vertical real entre files (99.37px)

        // Punts d'ancoratge inicials calculats des de l'hexàgon 1
        const OFFSET_X = 237;    
        const OFFSET_Y = 160; 

        const hexData = [
            { id: 1, c: 0, r: 2 }, { id: 2, c: 0, r: 3 }, { id: 3, c: 0, r: 4 }, { id: 4, c: 0, r: 5 },
            { id: 5, c: 1, r: 2 }, { id: 6, c: 1, r: 3 }, { id: 7, c: 1, r: 4 }, { id: 8, c: 1, r: 5 }, { id: 9, c: 1, r: 6 },
            { id: 10, c: 2, r: 2 }, { id: 11, c: 2, r: 3 }, { id: 12, c: 2, r: 4 },
            { id: 13, c: 3, r: 1 }, { id: 14, c: 3, r: 2 }, { id: 15, c: 3, r: 3 }, { id: 16, c: 3, r: 4 }, { id: 17, c: 3, r: 5 }, { id: 18, c: 3, r: 6 },
            { id: 19, c: 4, r: 0 }, { id: 20, c: 4, r: 1 }, { id: 21, c: 4, r: 2 }, { id: 22, c: 4, r: 3 }, { id: 23, c: 4, r: 4 }, { id: 24, c: 4, r: 5 }, { id: 25, c: 4, r: 6 },
            { id: 26, c: 5, r: 0 }, { id: 27, c: 5, r: 1 }, { id: 28, c: 5, r: 2 }, { id: 29, c: 5, r: 3 }, { id: 30, c: 5, r: 4 }, { id: 31, c: 5, r: 5 }, { id: 32, c: 5, r: 6 },
            { id: 33, c: 6, r: 0 }, { id: 34, c: 6, r: 1 }, { id: 35, c: 6, r: 2 }, { id: 36, c: 6, r: 3 }, { id: 37, c: 6, r: 4 }, { id: 38, c: 6, r: 5 }, { id: 39, c: 6, r: 6 },
            { id: 40, c: 7, r: 0 }, { id: 41, c: 7, r: 1 }, { id: 42, c: 7, r: 2 }, { id: 43, c: 7, r: 3 }, { id: 44, c: 7, r: 4 }, { id: 45, c: 7, r: 5 }, { id: 46, c: 7, r: 6 },
            { id: 47, c: 8, r: 0 }, { id: 48, c: 8, r: 1 }, { id: 49, c: 8, r: 2 }, { id: 50, c: 8, r: 3 }, { id: 51, c: 8, r: 4 }, { id: 52, c: 8, r: 5 }, { id: 53, c: 8, r: 6 },
            { id: 54, c: 9, r: 0 }, { id: 55, c: 9, r: 1 }, { id: 56, c: 9, r: 2 }, { id: 57, c: 9, r: 3 }, { id: 58, c: 9, r: 4 }, { id: 59, c: 9, r: 5 }, { id: 60, c: 9, r: 6 }
        ];

        hexData.forEach(hex => {
            // En pointy-topped, les columnes senars es desplacen cap avall mitja alçada de pas
            const isOddColumn = (hex.c % 2 !== 0);
            const verticalShift = isOddColumn ? (STEP_Y * 0.5) : 0;

            const cx = OFFSET_X + (hex.c * STEP_X);
            const cy = OFFSET_Y + (hex.r * STEP_Y) + verticalShift;

            // Coordenades dels 6 vèrtexs per a un hexàgon amb PUNTA A DALT i A BAIX
            const x1 = cx,                    y1 = cy - HEX_HEIGHT * 0.5; // Punta dalt
            const x2 = cx + HEX_WIDTH * 0.5,  y2 = cy - HEX_HEIGHT * 0.25;
            const x3 = cx + HEX_WIDTH * 0.5,  y3 = cy + HEX_HEIGHT * 0.25;
            const x4 = cx,                    y4 = cy + HEX_HEIGHT * 0.5; // Punta baix
            const x5 = cx - HEX_WIDTH * 0.5,  y5 = cy + HEX_HEIGHT * 0.25;
            const x6 = cx - HEX_WIDTH * 0.5,  y6 = cy - HEX_HEIGHT * 0.25;

            const pointsStr = `${x1},${y1} ${x2},${y2} ${x3},${y3} ${x4},${y4} ${x5},${y5} ${x6},${y6}`;

            const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            polygon.setAttribute("points", pointsStr);
            polygon.setAttribute("class", "hex-polygon");
            polygon.setAttribute("data-id", hex.id);

            svg.appendChild(polygon);
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ca">
<head>
    <style>
        body { margin: 0; display: flex; justify-content: center; background: #000; }
        svg { width: 100%; max-width: 1600px; }
        .hex-polygon { fill: transparent; stroke: #ff00ff; stroke-width: 2.5; cursor: pointer; }
        .hex-polygon:hover { fill: rgba(255, 255, 255, 0.3); }
    </style>
</head>
<body>
    <svg viewBox="0 0 1600 900" id="hex-grid">
        <image href="Mapa europa-Layout2.jpg" width="1600" height="900" />
    </svg>

    <script>
        const svg = document.getElementById('hex-grid');
        
        // Mides visuals extretes de la teva imatge
        const H = 127; // Alçada visual hexàgon
        const W = 110; // Amplada visual hexàgon
        
        const START_X = 293;
        const START_Y = 260;
        const COL_STEP = 110;
        const ROW_STEP = 95;

        // Definició de la graella (columna c, fila r)
        const hexData = [
            { id: 1, c: 0, r: 0 }, { id: 2, c: 0, r: 1 }, { id: 3, c: 0, r: 2 }, { id: 4, c: 0, r: 3 },
            { id: 5, c: 1, r: -1 }, { id: 6, c: 1, r: 0 }, { id: 7, c: 1, r: 1 }, { id: 8, c: 1, r: 2 }, { id: 9, c: 1, r: 3 },
            // ... (Aquesta lògica aplica la posició real)
        ];

        hexData.forEach(h => {
            const x = START_X + (h.c * COL_STEP);
            const y = START_Y + (h.r * ROW_STEP) + (h.c % 2 === 0 ? 47.5 : 0);
            
            // Dibuix d'un hexàgon amb punta a dalt
            const points = [
                `${x},${y - H/2}`,
                `${x + W/2},${y - H/4}`,
                `${x + W/2},${y + H/4}`,
                `${x},${y + H/2}`,
                `${x - W/2},${y + H/4}`,
                `${x - W/2},${y - H/4}`
            ].join(" ");

            const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            poly.setAttribute("points", points);
            poly.setAttribute("class", "hex-polygon");
            svg.appendChild(poly);
        });
    </script>
</body>
</html>

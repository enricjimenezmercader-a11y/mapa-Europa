<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Mapa Europa - Graella CAD</title>
    <style>
        body { margin: 0; background: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #container { position: relative; width: 90vw; }
        svg { width: 100%; height: auto; display: block; }
        .hex { fill: none; stroke: #ff00ff; stroke-width: 40000; vector-effect: non-scaling-stroke; }
    </style>
</head>
<body>
    <div id="container">
        <svg viewBox="0 0 26757154 22877366" id="map">
            <image href="https://raw.githubusercontent.com/enricjimenezmercader-a11y/mapa-Europa/main/Mapa%20europa-Layout2.jpg" 
                   width="26757154" height="22877366" />
        </svg>
    </div>

    <script>
        const svg = document.getElementById('map');
        
        // Paràmetres geomètrics definits per les teves coordenades
        const s = 797540.5; 
        const H = 1381380; 
        const STEP_X = 1.5 * s;
        const STEP_Y = H;
        
        // Origen basat en les dades de l'hexàgon 4
        const START_X = 2898289; 
        const START_Y = 2418393;

        function drawHex(c, r) {
            const x = START_X + (c * STEP_X);
            const y = START_Y + (r * STEP_Y) + (c % 2 !== 0 ? STEP_Y / 2 : 0);
            
            // Definicions dels vèrtexs
            const points = [
                `${x - s/2},${y - H/2}`, `${x + s/2},${y - H/2}`,
                `${x + s},${y}`, `${x + s/2},${y + H/2}`,
                `${x - s/2},${y + H/2}`, `${x - s},${y}`
            ].join(" ");

            const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            poly.setAttribute("points", points);
            poly.setAttribute("class", "hex");
            svg.appendChild(poly);
        }

        // Matriu de posicions de la graella
        const grid = [
            {c:0, r:0}, {c:0, r:1}, {c:0, r:2},
            {c:1, r:-1}, {c:1, r:0}, {c:1, r:1}, {c:1, r:2},
            {c:2, r:-1}, {c:2, r:0}, {c:2, r:1}, {c:2, r:2},
            {c:3, r:-2}, {c:3, r:-1}, {c:3, r:0}, {c:3, r:1}, {c:3, r:2},
            {c:4, r:-2}, {c:4, r:-1}, {c:4, r:0}, {c:4, r:1}, {c:4, r:2},
            {c:5, r:-2}, {c:5, r:-1}, {c:5, r:0}, {c:5, r:1}, {c:5, r:2}
        ];

        grid.forEach(h => drawHex(h.c, h.r));
    </script>
</body>
</html>

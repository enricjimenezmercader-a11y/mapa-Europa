<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>MAPA ESTRATÈGIC — Radar i Anàlisi</title>
    <style>
        /* Mantenim el teu estil original */
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%; background:#05050a; color:#fff; font-family:Arial,Helvetica,sans-serif; display:flex; flex-direction:column; align-items:center; padding-top:20px; gap:15px;}
        .map-container{ position:relative; background:#111; border:2px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.8); overflow:hidden; }
        .map-image{ position:absolute; inset:0; width:100%; height:100%; object-fit:contain; z-index:1; pointer-events:none; }
        svg{ position:absolute; inset:0; width:100%; height:100%; z-index:10; pointer-events:none; }
        .hex{ stroke:#000; stroke-width:2; }
        .hex-red{ fill:rgba(255,0,0,0.3); }
        .hex-blue{ fill:rgba(0,120,255,0.3); }
        .hex-mar{ fill:rgba(120,120,120,0.25); }
        .hex-label{ fill:#fff; font-weight:bold; text-anchor:middle; stroke:#000; stroke-width:0.8; font-size:12px; }
    </style>
</head>
<body>

<div id="titleBar">MAPA ESTRATÈGIC</div>
<div id="mapContainer" class="map-container">
    <img class="map-image" src="https://github.com/enricjimenezmercader-a11y/mapa_estrategic/blob/481d1cc0765b31581a6f050a7f68d53400172e48/map_hex.jpg?raw=true" alt="Mapa">
    <svg id="hexGrid"></svg>
</div>

<script>
    // Configuració basada en els 155px (CAD)
    const s = 155; 
    const H = Math.sqrt(3) * s; 
    const STEP_X = 1.5 * s;     // 232.5
    const STEP_Y = Math.sqrt(3) * s; // 268.46
    const START_X = 265; 
    const START_Y = 277;

    function initHexGridStructure(){
        const svg = document.getElementById("hexGrid");
        svg.innerHTML = "";
        
        // Definim la graella segons el patró que tenies originalment
        const grid = [
            {c:0, r:0}, {c:0, r:1}, {c:0, r:2},
            {c:1, r:-1}, {c:1, r:0}, {c:1, r:1}, {c:1, r:2},
            // ... afegeix aquí la resta de columnes/files del teu array PATTERN
        ];

        grid.forEach((h, index) => {
            const x = START_X + (h.c * STEP_X);
            const y = START_Y + (h.r * STEP_Y) + (h.c % 2 !== 0 ? STEP_Y / 2 : 0);
            
            // Generació vèrtexs FLAT-TOPPED (Vora plana a dalt)
            const pts = [
                `${x - s/2},${y - H/2}`, `${x + s/2},${y - H/2}`,
                `${x + s},${y}`, `${x + s/2},${y + H/2}`,
                `${x - s/2},${y + H/2}`, `${x - s},${y}`
            ].join(" ");

            const g = document.createElementNS("http://www.w3.org/2000/svg","g");
            const poly = document.createElementNS("http://www.w3.org/2000/svg","polygon");
            poly.setAttribute("points", pts);
            poly.setAttribute("class", "hex hex-mar");
            poly.dataset.id = index + 1;
            
            g.appendChild(poly);
            svg.appendChild(g);
        });
    }

    // Inicialització
    initHexGridStructure();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ca">
<head>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; }
        svg { width: 100%; max-width: 1600px; height: auto; }
        .hex { fill: none; stroke: #ff00ff; stroke-width: 3; }
    </style>
</head>
<body>
    <svg viewBox="0 0 1600 900" id="map">
        <image href="Mapa europa-Layout2.jpg" width="1600" height="900" />
    </svg>

    <script>
        const svg = document.getElementById('map');
        
        // Valors extrets directament del teu fitxer (Píxel a Píxel)
        const H = 127; // Alçada visual punta a punta
        const W = 110; // Amplada visual costat a costat
        const STEP_X = 110;
        const STEP_Y = 95;
        const START_X = 293;
        const START_Y = 260;

        // Funció per dibuixar hexàgon Pointy-Topped
        function drawHex(c, r) {
            const x = START_X + (c * STEP_X);
            const y = START_Y + (r * STEP_Y) + (c % 2 === 0 ? 47.5 : 0);
            
            const p = [
                `${x},${y - H/2}`, `${x + W/2},${y - H/4}`,
                `${x + W/2},${y + H/4}`, `${x},${y + H/2}`,
                `${x - W/2},${y + H/4}`, `${x - W/2},${y - H/4}`
            ].join(" ");

            const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
            poly.setAttribute("points", p);
            poly.setAttribute("class", "hex");
            svg.appendChild(poly);
        }

        // Mapeig de la teva graella visual (c=columna, r=fila relativa)
        const grid = [
            {c:0, r:0}, {c:0, r:1}, {c:0, r:2}, {c:0, r:3},
            {c:1, r:-1}, {c:1, r:0}, {c:1, r:1}, {c:1, r:2}, {c:1, r:3},
            {c:2, r:-1}, {c:2, r:0}, {c:2, r:1}, {c:2, r:2},
            {c:3, r:-2}, {c:3, r:-1}, {c:3, r:0}, {c:3, r:1}, {c:3, r:2}, {c:3, r:3},
            {c:4, r:-3}, {c:4, r:-2}, {c:4, r:-1}, {c:4, r:0}, {c:4, r:1}, {c:4, r:2}, {c:4, r:3},
            {c:5, r:-3}, {c:5, r:-2}, {c:5, r:-1}, {c:5, r:0}, {c:5, r:1}, {c:5, r:2}, {c:5, r:3},
            {c:6, r:-3}, {c:6, r:-2}, {c:6, r:-1}, {c:6, r:0}, {c:6, r:1}, {c:6, r:2}, {c:6, r:3},
            {c:7, r:-3}, {c:7, r:-2}, {c:7, r:-1}, {c:7, r:0}, {c:7, r:1}, {c:7, r:2}, {c:7, r:3},
            {c:8, r:-3}, {c:8, r:-2}, {c:8, r:-1}, {c:8, r:0}, {c:8, r:1}, {c:8, r:2}, {c:8, r:3},
            {c:9, r:-3}, {c:9, r:-2}, {c:9, r:-1}, {c:9, r:0}, {c:9, r:1}, {c:9, r:2}, {c:9, r:3}
        ];

        grid.forEach(h => drawHex(h.c, h.r));
    </script>
</body>
</html>
